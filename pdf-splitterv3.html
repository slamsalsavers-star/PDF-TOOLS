<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Santo PDF Splitter Pro</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <link rel="stylesheet" href="css/pdf-splitter.css">
</head>

<body>
<nav class="site-nav">
  <div class="nav-inner">
    <a class="brand" href="index.html">PDF Tools Hub</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="pdf-splitterv3.html">Tools</a>
      <a href="index.html#feedback">Share Feedback</a>
    </div>
  </div>
</nav>
<div class="container">
  <h2>Santo PDF Splitter Pro</h2>

  <div class="controls">
    <label for="pdfFile">Choose PDF</label>
    <input type="file" id="pdfFile" accept="application/pdf" />

    <label for="prefix">Filename Prefix</label>
    <input type="text" id="prefix" placeholder="SOVVSP-" />

    <label for="startNo">Start Number</label>
    <input type="number" id="startNo" placeholder="1" min="1" />
  </div>

  <div class="actions">
    <button id="loadBtn" class="primary">Load PDF</button>
    <label for="rangeInput">Split Range</label>
    <input type="text" id="rangeInput" placeholder="1-3,5,7-9" />
    <button id="selectAllBtn" class="secondary" disabled>Select All</button>
    <button id="deselectAllBtn" class="secondary" disabled>Deselect All</button>
    <button id="splitBtn" class="secondary" disabled>Split</button>
    <button id="downloadZipBtn" class="primary" disabled>Download All as ZIP</button>
    <button id="clearBtn" class="danger" disabled>Clear</button>
  </div>

  <div id="status">Load a PDF to begin.</div>

  <div id="rangeGroups"></div>
  <div id="pages"></div>

  <div id="previewModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <span id="previewTitle">Page preview</span>
        <button id="closePreviewBtn" class="danger">Close</button>
      </div>
      <div class="modal-body">
        <canvas id="previewCanvas"></canvas>
      </div>
      <div class="modal-footer">
        <button id="zoomOutBtn" class="secondary">Zoom Out</button>
        <button id="zoomInBtn" class="secondary">Zoom In</button>
        <span id="zoomLevel">100%</span>
      </div>
    </div>
  </div>
</div>

<script src="js/pdf-splitter.js"></script>
</body>
</html>
