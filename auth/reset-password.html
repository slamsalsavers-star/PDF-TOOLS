<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — PDF Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #4f46e5; --primary-dark: #4338ca; --bg: #f1f5f9; --surface: #fff; --border: #e2e8f0; --text: #0f172a; --text-2: #334155; --text-muted: #64748b; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 10px 40px rgba(15,23,42,.10); width: 100%; max-width: 400px; padding: 36px 32px; }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-icon { width: 38px; height: 38px; background: var(--primary); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { color: #fff; }
    .logo-text { font-size: 18px; font-weight: 800; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
    input { width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
    .btn { width: 100%; padding: 11px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:hover:not(:disabled) { background: var(--primary-dark); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .alert { padding: 12px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-bottom: 18px; display: none; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert.show { display: block; }
    .links { margin-top: 20px; text-align: center; font-size: 13px; }
    .links a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .strength { height: 4px; border-radius: 4px; margin-top: 6px; background: var(--border); overflow: hidden; }
    .strength-bar { height: 100%; border-radius: 4px; transition: width .2s, background .2s; width: 0%; }
    .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <span class="logo-text">PDF Tools</span>
    </div>

    <h1>Choose a new password</h1>
    <p class="sub">Enter a new password for your account.</p>

    <div id="alert" class="alert"></div>
    <div id="no-token" style="display:none; text-align:center; color:#64748b; font-size:14px;">
      This link is invalid or has expired. <a href="forgot-password.html" style="color:#4f46e5;font-weight:600;">Request a new one.</a>
    </div>

    <form id="rp-form" novalidate>
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" minlength="8" required autocomplete="new-password">
        <div class="strength"><div class="strength-bar" id="strength-bar"></div></div>
        <div class="hint" id="strength-hint">Min. 8 characters</div>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button type="submit" id="submit-btn" class="btn">Set new password</button>
    </form>

    <div class="links"><a href="login.html">← Back to sign in</a></div>
  </div>

  <script src="../js/api-client.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('rp-form').style.display = 'none';
      document.getElementById('no-token').style.display = 'block';
    }

    const form  = document.getElementById('rp-form');
    const alert = document.getElementById('alert');
    const btn   = document.getElementById('submit-btn');
    const pwEl  = document.getElementById('password');
    const bar   = document.getElementById('strength-bar');
    const hint  = document.getElementById('strength-hint');

    function showMsg(msg, type) {
      alert.textContent = msg;
      alert.className   = `alert alert-${type} show`;
    }

    // Password strength indicator
    pwEl.addEventListener('input', () => {
      const v = pwEl.value;
      let score = 0;
      if (v.length >= 8)  score++;
      if (v.length >= 12) score++;
      if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^a-zA-Z0-9]/.test(v)) score++;
      const colors = ['#dc2626','#f59e0b','#f59e0b','#059669','#059669'];
      const labels = ['Too short','Weak','Fair','Strong','Very strong'];
      bar.style.width      = (score * 20) + '%';
      bar.style.background = colors[Math.max(0,score-1)] || '#e2e8f0';
      hint.textContent     = v.length ? labels[Math.max(0,score-1)] : 'Min. 8 characters';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alert.className = 'alert';

      if (pwEl.value.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
      if (pwEl.value !== document.getElementById('confirm').value) { showMsg('Passwords do not match.', 'error'); return; }

      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';

      try {
        await apiFetch('POST', '/auth/reset-password', { token, password: pwEl.value });
        showMsg('Password updated! Redirecting to sign in…', 'success');
        form.style.display = 'none';
        setTimeout(() => { location.href = 'login.html'; }, 2000);
      } catch (err) {
        showMsg(err.message || 'Invalid or expired link.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Set new password';
      }
    });
  </script>
</body>
</html>
