<!DOCTYPE html>
<html>
<head>
  <title>PDF Splitter Pro</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- PDF-LIB -->
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 15px;
    }

    input[type="file"] {
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      background-color: #0078d4;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005ea2;
    }

    .page-card {
      display: flex;
      align-items: center;
      gap: 15px;
      background: #fafafa;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }

    canvas {
      border: 1px solid #ccc;
    }

    .download-btn {
      background-color: #28a745;
    }

    .download-btn:hover {
      background-color: #1e7e34;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📄 PDF Splitter Pro</h2>

  <input type="file" id="pdfFile" accept="application/pdf" />
  <br>
  <button id="splitBtn">Split PDF</button>

  <h3>Pages</h3>
  <div id="pages"></div>
</div>

<script>
$(document).ready(function () {

  $('#splitBtn').click(async function () {

    const file = $('#pdfFile')[0].files[0];

    if (!file) {
      alert("Please upload PDF");
      return;
    }

    const arrayBuffer = await file.arrayBuffer();
    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);

    const totalPages = pdfDoc.getPageCount();
    $('#pages').html("");

    for (let i = 0; i < totalPages; i++) {

      // Create new PDF for each page
      const newPdf = await PDFLib.PDFDocument.create();
      const [page] = await newPdf.copyPages(pdfDoc, [i]);
      newPdf.addPage(page);

      const pdfBytes = await newPdf.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);

      // Create preview canvas
      const canvas = document.createElement("canvas");
      canvas.width = 120;
      canvas.height = 160;
      const ctx = canvas.getContext("2d");

      // Simple placeholder preview (since rendering PDF fully needs pdf.js)
      ctx.fillStyle = "#eee";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#333";
      ctx.fillText("Page " + (i + 1), 30, 80);

      // Rename input
      const input = document.createElement("input");
      input.value = `page-${i + 1}`;
      input.style.padding = "5px";

      // Download button
      const btn = document.createElement("button");
      btn.className = "download-btn";
      btn.textContent = "Download";

      btn.onclick = function () {
        const a = document.createElement("a");
        a.href = url;
        a.download = input.value + ".pdf";
        a.click();
      };

      // Card layout
      const card = document.createElement("div");
      card.className = "page-card";

      card.appendChild(canvas);
      card.appendChild(input);
      card.appendChild(btn);

      document.getElementById("pages").appendChild(card);
    }
  });

});
</script>

</body>
</html>
