<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF Merger — PDF Tools Hub</title>
  <link rel="stylesheet" href="css/pdf-merger.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
<div class="app">

  <header class="app-header">
    <div>
      <h1>PDF Merger</h1>
      <p>Combine multiple PDFs into one — entirely in your browser.</p>
    </div>
    <a href="index.html" class="back-link">← Back to Hub</a>
  </header>

  <div class="card">
    <!-- Upload -->
    <div class="section">
      <input type="file" id="pdfFiles" accept="application/pdf" multiple style="display:none" />
      <div class="upload-zone" id="uploadZone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h3>Drop PDF files here</h3>
        <p>or click to browse — you can select multiple files at once</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="section">
      <div class="toolbar">
        <div class="field-row">
          <label for="outputName">Output filename</label>
          <input type="text" id="outputName" class="input w-48" placeholder="merged" />
        </div>
        <div class="toolbar-sep"></div>
        <button id="mergeBtn" class="btn btn-success" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M8 6H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-3M15 3H9v4h6V3z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Merge &amp; Download
        </button>
        <button id="clearBtn" class="btn btn-danger btn-sm" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Clear All
        </button>
      </div>
    </div>

    <!-- Progress + Status -->
    <div class="section">
      <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="status-bar" id="statusBar">
        <div class="status-dot"></div>
        <span id="statusText">Add PDF files to begin.</span>
      </div>
    </div>
  </div>

  <!-- File List -->
  <div id="fileListWrap" style="display:none">
    <div class="card">
      <div class="section">
        <div class="section-label">
          Files to merge
          <span class="count-badge" id="countBadge"></span>
        </div>
        <div class="file-list" id="fileList"></div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div id="emptyState" class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p>No files added — drop PDFs above or click to browse.</p>
  </div>

</div>

<!-- Toasts -->
<div id="toast-root"></div>

<script src="js/pdf-merger.js" defer></script>
</body>
</html>
